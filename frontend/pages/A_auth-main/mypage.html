<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>마이페이지 - Flea-market</title>
  <link rel="stylesheet" href="../../common/css/style.css" />
</head>
<body>
  <div class="container">
    <h1>마이페이지</h1>

    <label class="switch">
      <input type="checkbox" id="role-toggle" />
      주최자 모드 / 셀러 모드 전환
    </label>

    <form id="profile-form">
      <input type="text" id="phone" placeholder="전화번호" />
      <input type="text" id="region" placeholder="거주 지역" />
      <input type="password" id="password" placeholder="새 비밀번호" />
      <button type="submit" class="btn btn-primary">정보 수정</button>
    </form>

    <button id="delete-account-btn" class="btn">회원 탈퇴</button>
  </div>

  <script src="../../common/js/api.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
