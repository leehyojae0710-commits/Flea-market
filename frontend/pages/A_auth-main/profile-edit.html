<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>내 정보 수정 - 플리마켓</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../../common/css/style.css" />
  <link rel="stylesheet" href="css/auth.css" />
</head>
<body>
  <div class="auth-wrap auth-wrap-wide">
    <a href="mypage.html" class="auth-brand">
      <span class="pin-dot" aria-hidden="true"></span>플리마켓
    </a>

    <div class="auth-card">
      <span class="pin" aria-hidden="true"></span>
      <h1>내 정보 수정</h1>
      <p class="auth-sub">프로필과 계정 정보를 관리할 수 있어요.</p>

      <div id="alert-box" class="alert alert-error" role="alert"></div>

      <div class="edit-layout">
        <div class="edit-tabs" role="tablist">
          <button type="button" class="edit-tab-btn active" data-panel="panel-basic">프로필 설정</button>
          <button type="button" class="edit-tab-btn" data-panel="panel-bio">소개 관리</button>
          <button type="button" class="edit-tab-btn" data-panel="panel-account">내 정보 수정</button>
        </div>

        <div class="edit-panels">
          <div id="panel-basic" class="edit-panel active">
            <div class="section-title">프로필 설정</div>
            <form id="profile-basic-form" novalidate>
              <div class="form-field">
                <label for="nickname">닉네임</label>
                <input type="text" id="nickname" class="form-input" placeholder="마이페이지에 표시될 닉네임" maxlength="50" />
              </div>
              <div class="form-field">
                <label for="intro-text">프로필 한 줄 소개</label>
                <input type="text" id="intro-text" class="form-input" placeholder="예: 제주에서 소품을 만들어요." maxlength="150" />
              </div>
              <div class="form-field">
                <label for="profile-image">프로필 사진</label>
                <input type="file" id="profile-image" accept=".jpg,.jpeg,.png" />
                <p class="form-hint">jpg, jpeg, png 파일만 업로드할 수 있어요. 바꾸지 않으면 기존 사진이 그대로 유지돼요.</p>
                <div id="profile-image-status"></div>
                <input type="hidden" id="uploaded-profile-image-path" />
              </div>
              <button type="submit" id="profile-basic-submit-btn" class="btn btn-primary btn-block">프로필 저장</button>
            </form>
          </div>

          <div id="panel-bio" class="edit-panel">
            <div class="section-title">소개 관리</div>
            <form id="profile-bio-form" novalidate>
              <div class="form-field">
                <label for="bio-text">소개글</label>
                <textarea id="bio-text" class="form-input form-textarea" rows="4" placeholder="마이페이지 소개글에 표시될 내용을 입력해주세요." maxlength="1000"></textarea>
              </div>
              <div class="form-field">
                <label for="bio-image">소개 이미지</label>
                <input type="file" id="bio-image" accept=".jpg,.jpeg,.png" />
                <p class="form-hint">jpg, jpeg, png 파일만 업로드할 수 있어요. 바꾸지 않으면 기존 이미지가 그대로 유지돼요.</p>
                <div id="bio-image-status"></div>
                <input type="hidden" id="uploaded-bio-image-path" />
              </div>
              <button type="submit" id="profile-bio-submit-btn" class="btn btn-primary btn-block">소개 저장</button>
            </form>
          </div>

          <div id="panel-account" class="edit-panel">
            <div class="section-title">내 정보 수정</div>
            <form id="profile-form" novalidate>
              <div class="form-field">
                <label for="phone">전화번호</label>
                <input type="text" id="phone" class="form-input" placeholder="010-1234-5678" autocomplete="tel" pattern="01[0-9]-[0-9]{3,4}-[0-9]{4}" title="010-0000-0000 형식으로 입력해주세요" />
              </div>
              <div class="form-field">
                <label for="region">거주 지역</label>
                <input type="text" id="region" class="form-input" placeholder="예: 서울 마포구" />
              </div>
              <button type="submit" id="profile-submit-btn" class="btn btn-primary btn-block">정보 수정</button>
            </form>

            <hr class="section-divider" />

            <div class="section-title">비밀번호 변경</div>
            <form id="password-form" novalidate>
              <div class="form-field">
                <label for="current-password">현재 비밀번호</label>
                <input type="password" id="current-password" class="form-input" placeholder="현재 비밀번호" autocomplete="current-password" />
              </div>
              <div class="form-field">
                <label for="new-password">새 비밀번호</label>
                <input type="password" id="new-password" class="form-input" placeholder="8자 이상" autocomplete="new-password" minlength="8" />
              </div>
              <div class="form-field">
                <label for="new-password-confirm">새 비밀번호 확인</label>
                <input type="password" id="new-password-confirm" class="form-input" placeholder="새 비밀번호 다시 입력" autocomplete="new-password" minlength="8" />
              </div>
              <button type="submit" id="password-submit-btn" class="btn btn-primary btn-block">비밀번호 변경</button>
            </form>

            <hr class="section-divider" />

            <div class="section-title">계정 관리</div>
            <div class="mypage-actions">
              <button type="button" id="logout-btn" class="btn btn-outline">로그아웃</button>
              <button type="button" id="delete-account-btn" class="btn btn-danger">회원 탈퇴</button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <a href="mypage.html" class="back-home">← 마이페이지로</a>
  </div>

  <script src="../../common/js/api.js?v=2"></script>
  <script src="../../common/js/validators.js?v=2"></script>
  <script src="js/profile-edit.js?v=2"></script>
</body>
</html>
