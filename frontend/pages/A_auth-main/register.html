<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>회원가입 - 플리마켓</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../../common/css/style.css" />
  <link rel="stylesheet" href="css/auth.css" />
</head>
<body>
  <div class="auth-wrap">
    <a href="../../index.html" class="auth-brand">
      <span class="pin-dot" aria-hidden="true"></span>플리마켓
    </a>

    <div class="auth-card">
      <span class="pin" aria-hidden="true"></span>
      <h1>회원가입</h1>
      <p class="auth-sub">어떤 역할로 시작하시나요?</p>

      <div id="alert-box" class="alert alert-error" role="alert"></div>

      <div id="role-select" class="role-grid">
        <button type="button" class="role-card" data-role="host">
          <span class="role-emoji" aria-hidden="true">📋</span>
          <span class="role-name">주최측으로 가입</span>
          <span class="role-desc">마켓을 열고 셀러를 모집해요</span>
        </button>
        <button type="button" class="role-card" data-role="seller">
          <span class="role-emoji" aria-hidden="true">🧺</span>
          <span class="role-name">판매자로 가입</span>
          <span class="role-desc">부스를 신청하고 물건을 팔아요</span>
        </button>
      </div>

      <div id="selected-role-banner" class="selected-role-banner">
        <span id="selected-role-text"></span>
        <button type="button" id="change-role-btn">역할 다시 선택</button>
      </div>

      <form id="register-form" style="display:none;" novalidate>
        <input type="hidden" id="selected-role" />
        <div class="form-field">
          <label for="email">이메일</label>
          <input type="email" id="email" class="form-input" placeholder="you@example.com" autocomplete="email" required />
        </div>
        <div class="form-field">
          <label for="password">비밀번호</label>
          <input type="password" id="password" class="form-input" placeholder="8자 이상 입력해주세요" autocomplete="new-password" minlength="8" required />
        </div>
        <div class="form-field">
          <label for="phone">전화번호</label>
          <input type="text" id="phone" class="form-input" placeholder="010-1234-5678" autocomplete="tel" pattern="01[0-9]-[0-9]{3,4}-[0-9]{4}" title="010-0000-0000 형식으로 입력해주세요" required />
        </div>
        <div class="form-field">
          <label for="region">거주 지역</label>
          <input type="text" id="region" class="form-input" placeholder="예: 서울 마포구" required />
        </div>
        <button type="submit" id="register-submit-btn" class="btn btn-primary btn-block">가입하기</button>
      </form>

      <p class="auth-foot">이미 계정이 있으신가요? <a href="login.html">로그인</a></p>
    </div>

    <a href="../../index.html" class="back-home">← 로그인 없이 마켓 둘러보기</a>
  </div>

  <script src="../../common/js/api.js?v=2"></script>
  <script src="../../common/js/validators.js?v=2"></script>
  <script src="js/auth.js?v=2"></script>
</body>
</html>
