<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>부스 정보 수정 - 플리마켓</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../../common/css/style.css" />
  <link rel="stylesheet" href="css/host-seller.css" />
</head>
<body>
  <div class="page-wrap">
    <header class="nav">
      <a href="../../index.html" class="brand"><span class="pin-dot" aria-hidden="true"></span>플리마켓</a>
      <a href="../A_auth-main/mypage.html" class="link-ghost">마이페이지</a>
    </header>

    <div class="panel">
      <span class="pin" aria-hidden="true"></span>
      <h1>부스 정보 수정</h1>
      <p class="panel-sub" id="booth-edit-sub">신청하신 부스 정보를 수정해주세요.</p>

      <div id="alert-box" class="alert alert-error" role="alert"></div>

      <form id="booth-edit-form" novalidate>
        <input type="hidden" id="application-id" />

        <div class="form-field">
          <label for="booth-number">부스 번호</label>
          <input type="text" id="booth-number" class="form-input" placeholder="예: 1, A1" required />
        </div>

        <div class="form-field">
          <label for="booth-title">부스 이름</label>
          <input type="text" id="booth-title" class="form-input" placeholder="예: 민지네 빈티지샵" required />
        </div>

        <div class="form-field">
          <label for="item-name">판매 물품 이름</label>
          <input type="text" id="item-name" class="form-input" placeholder="예: 빈티지 자켓 모음" required />
        </div>

        <div class="form-field">
          <label for="product-image">대표 이미지</label>
          <input type="file" id="product-image" class="form-input" accept="image/*" />
          <p class="form-hint">jpg, jpeg, png 파일만 업로드할 수 있어요. 바꾸지 않으면 기존 이미지가 그대로 유지돼요.</p>
          <div id="current-image-status"></div>
          <img id="product-image-preview" alt="" style="display:none;max-width:100%;border-radius:8px;margin-top:10px;" />
          <input type="hidden" id="uploaded-item-image-path" />
        </div>

        <div class="form-field">
          <label for="product-desc">판매 물품 소개</label>
          <textarea id="product-desc" class="form-textarea" placeholder="어떤 물건을 판매하실 건지 자유롭게 소개해주세요."></textarea>
        </div>

        <button type="submit" id="booth-edit-submit-btn" class="btn btn-primary btn-block">수정하기</button>
      </form>
    </div>

    <a href="mybooth.html" class="back-link">← 내 부스 관리로 돌아가기</a>
  </div>

  <script src="../../common/js/api.js?v=2"></script>
  <script src="js/boothedit.js?v=1"></script>
</body>
</html>
