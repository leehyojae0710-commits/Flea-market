<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>마켓 등록 - 플리마켓</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@500&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="../../common/css/style.css" />
    <link rel="stylesheet" href="css/host-seller.css" />
    <script src = "js/marketdate.js"></script>
    <script src="../../common/js/api.js"></script>
    <!-- <script src="../../common/js/api.js?v=2"></script> -->
    <script>
        async function getMyMarkets() {
            return callApi('/markets/mine');
        }

        function formatDate(dateString) {
            if (!dateString) return '';
            const d = new Date(dateString);
            const y = d.getFullYear();
            const m = String(d.getMonth() + 1).padStart(2, '0');
            const day = String(d.getDate()).padStart(2, '0');
            return `${y}-${m}-${day}`;
        }

        async function loadMyMarkets() {
            const listEl = document.getElementById('market-list');
            const emptyEl = document.getElementById('empty-state');

            const res = await getMyMarkets();

            if (!res.success || !Array.isArray(res.data) || res.data.length === 0) {
                listEl.innerHTML = '';
                emptyEl.hidden = false;
                return;
            }

            emptyEl.hidden = true;

            listEl.innerHTML = res.data.map(market => `
      <li class="my-market-item" data-market-id="${market.marketId}">
        <div class="my-market-item-top">
          <span class="my-market-item-title">${market.title}</span>
          <button type="button" class="btn btn-danger btn-sm" id= "market-delete-btn">삭제하기</button>
        </div>
        <div class="my-market-item-meta">
          ${formatDate(market.eventDate_min)} ~ ${formatDate(market.eventDate_max)}
        </div>
        <div class="my-market-item-meta">${market.locationName || ''}</div>
      </li>
    `).join('');
        }

        document.addEventListener('DOMContentLoaded', loadMyMarkets);
    </script>
</head>

<body>
    <div class="page-wrap">
        <header class="nav">
            <a href="../../index.html" class="brand"><span class="pin-dot" aria-hidden="true"></span>플리마켓</a>
            <a href="../A_auth-main/mypage.html" class="link-ghost">마이페이지</a>
        </header>

        <div class="panel">
            <span class="pin" aria-hidden="true"></span>
            <h1>내 마켓 관리</h1>
            <p class="panel-sub">주최자로 등록한 마켓을 확인하고 관리할 수 있어요.</p>

            <div id="alert-box" class="alert alert-error" role="alert"></div>

            <div id="market-list-container">
                <ul id="market-list" class="market-list"></ul>
                <p id="empty-state" class="empty-state" hidden>등록한 마켓이 없어요. 마켓을 등록해보세요.</p>
            </div>
            <a href="../../index.html" class="back-link">← 마켓 목록으로</a>
        </div>
    </div>
</body>

</html>
