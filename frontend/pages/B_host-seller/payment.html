<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>부스료 결제 - 플리마켓</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../../common/css/style.css" />
  <link rel="stylesheet" href="css/host-seller.css" />

<body>

    <div class="panel">
      <span class="pin" aria-hidden="true"></span>

      <button id="pay-btn" class="btn btn-primary btn-block">결제하기</button>
