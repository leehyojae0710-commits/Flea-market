<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>부스료 결제 - 플리마켓</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../../common/css/style.css" />
  <link rel="stylesheet" href="css/host-seller.css" />
</head>
<body>
  <div class="page-wrap" style="max-width:420px;">
    <header class="nav">
      <a href="../../index.html" class="brand"><span class="pin-dot" aria-hidden="true"></span>플리마켓</a>
    </header>

    <div class="panel">
      <span class="pin" aria-hidden="true"></span>
      <h1>부스료 결제</h1>
      <p class="panel-sub">모의 결제입니다. 실제 결제는 이루어지지 않아요.</p>

      <div id="alert-box" class="alert alert-error" role="alert"></div>

      <div class="payment-card">
        <p class="account">가상 계좌 · 123-456-789012</p>
        <p class="amount"><span id="amount">0</span>원</p>
        <p class="form-hint">위 금액을 확인 후 결제를 완료해주세요.</p>
      </div>

      <button id="fake-payment-btn" class="btn btn-primary btn-block">결제 완료 처리</button>
    </div>

    <a href="../../index.html" class="back-link">← 마켓 목록으로</a>
  </div>

  <script src="../../common/js/api.js"></script>
  <script src="js/payment.js"></script>
</body>
</html>
